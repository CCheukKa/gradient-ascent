<!doctype html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gradient Ascent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cascadia+Code:ital,wght@0,200..700;1,200..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="style.css" />
    <script defer src="script.ts"></script>
</head>

<body>
    <div class="buildWatermark">Build: #!build</div>
    <div id="controlsContainer">
        <div class="blindModeToggle">
            <span class="blindModeToggleArrow">▶</span>
            <input type="checkbox" id="blindModeToggleButton" name="blindModeToggle" checked />
        </div>
        <div id="score">Score: 0</div>
        <div class="modeToggle" role="group" aria-label="Surface mode">
            <button type="button" class="modeToggleButton" data-mode="gaussian" aria-pressed="true">Gaussians</button>
            <button type="button" class="modeToggleButton" data-mode="network" aria-pressed="false">Network</button>
        </div>
        <div id="networkView">
            <canvas id="networkDiagram" height="200" width="400"></canvas>
            <div class="layers">
                <textarea name="layerControls" id="networkLayerControls" rows="1">2 4 4 4</textarea>
                <span>1</span>
            </div>
        </div>
        <div class="graphParameterControls">
            <div id="gaussianControls">
                <div class="slider">
                    <label for="gaussian-x">X Position:</label>
                    <input type="range" id="gaussian-x" name="gaussian-x" min="-10" max="10" step="0.01" value="0" />
                    <span id="gaussian-x-value">0</span>
                </div>
                <div class="slider">
                    <label for="gaussian-y">Y Position:</label>
                    <input type="range" id="gaussian-y" name="gaussian-y" min="-10" max="10" step="0.01" value="0" />
                    <span id="gaussian-y-value">0</span>
                </div>
            </div>
            <div id="networkControls">
                <template id="parameterControlTemplate">
                    <div class="parameterControl">
                        <div class="parameterControlHeader">
                            <label class="parameterLabelText"></label>
                            <input type="checkbox" class="parameterAxisCheckbox" />
                            <input type="range" class="parameterControlSlider" min="-10" max="10" step="0.00001" />
                            <span class="parameterControlValue">0</span>
                        </div>
                    </div>
                </template>
            </div>
        </div>
        <div id="rotationControls" class="slider">
            <label for="rotation-y">Rotate:</label>
            <input type="range" id="rotation-y" name="rotation-y" min="-180" max="180" step="1" value="0" />
        </div>
        <div id="zoomControls" class="slider">
            <label for="zoom-distance">Zoom:</label>
            <input type="range" id="zoom-distance" name="zoom-distance" min="10" max="20" step="0.01" value="15" />
        </div>
    </div>
</body>
